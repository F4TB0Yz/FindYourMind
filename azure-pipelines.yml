# 1. Disparador: Se activa solo cuando se sube algo a la rama main
trigger:
- main

# 2. Entorno: Default para que busque el agente local
pool:
  name: 'Default'

# 3. Pasos: Las tareas que Azure hará en orden
steps:
- task: DownloadSecureFile@1
  name: dotEnvFile
  inputs:
    secureFile: '.env'
- script: |
    cp $(dotEnvFile.secureFilePath) $(System.DefaultWorkingDirectory)/.env
  displayName: 'Restaurar archivo .env'

# Paso A: Preparar el entorno para Fluttersteps:
# 1. Descargar Flutter manualmente (Sin plugins externos)
- script: |
    git clone https://github.com/flutter/flutter.git -b stable
    echo "##vso[task.prependpath]$(pwd)/flutter/bin"
  displayName: 'Instalando Flutter manualmente'

# 2. Verificar que Flutter esté listo
- script: flutter doctor
  displayName: 'Verificando instalación'

# 3. Instalar las dependencias de FindYourMind
- script: flutter pub get
  displayName: 'Instalando librerías'

# 4. Compilar el módulo funcional
- script: flutter build apk --debug
  displayName: 'Compilando APK (Módulo de Notas)'