name: find_your_mind
description: "Find Your Mind es una aplicación de gestión de hábitos que te ayuda a crear, seguir y mantener tus hábitos diarios. Con una interfaz intuitiva y características personalizables, Find Your Mind te permite establecer metas, recibir recordatorios y visualizar tu progreso a lo largo del tiempo. Ya sea que quieras mejorar tu salud, aumentar tu productividad o simplemente mantener un estilo de vida más organizado, Find Your Mind es la herramienta perfecta para ayudarte a alcanzar tus objetivos."
publish_to: 'none'
version: 0.4.0

environment:
  sdk: ^3.8.1

dependencies:
  dartz: ^0.10.1
  drift: ^2.23.0
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_dotenv: 6.0.0
  flutter_lints: 6.0.0
  flutter_slidable: 4.0.3
  flutter_svg: 2.2.1
  # fluttertoast removed: not referenced in code
  # home_widget removed: not referenced in code
  internet_connection_checker: ^3.0.1
  logger: ^2.5.0
  path: ^1.9.0
  path_provider: ^2.1.5
  provider: 6.1.5+1
  sqlite3_flutter_libs: ^0.5.24
  supabase_flutter: 2.10.1
  uuid: ^4.5.1
  shared_preferences: ^2.2.2
  go_router: ^14.6.3
  google_fonts: ^6.2.1
  google_sign_in: ^6.2.2
  # flutter_native_splash removed: no launch config in pubspec
  shimmer: ^3.0.0
  hugeicons: ^1.1.6

dev_dependencies:
  build_runner: ^2.4.15
  drift_dev: ^2.23.0
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/icons/
    - .env
    
